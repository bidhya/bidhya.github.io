[workspace]
authors = ["bidhya <yadav.111@osu.edu>"]
channels = ["conda-forge"]
name = "githubio"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
serve = "mkdocs serve"
build = "mkdocs build"
sync-docs = "python sync_docs.py"
stage-deploy = "./stage_deploy.sh"

[dependencies]
python = ">=3.14.6,<3.15"
mkdocs = ">=1.6.1,<2"
mkdocs-material = ">=9.7.6,<10"
mkdocs-jupyter = ">=0.25.1,<0.26"
pymdown-extensions = ">=10.21.3,<11"
