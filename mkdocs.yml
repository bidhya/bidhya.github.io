site_name: Bidhyananda Yadav | Portfolio
site_url: https://bidhya.github.io/
site_author: Bidhyananda Yadav
site_description: Portfolio site showcasing expertise in Spatial Data Science, Remote Sensing, and Machine Learning.

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode (slate)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-purple
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.select

plugins:
  - search
  - tags:
      tags_file: tags.md
  - mkdocs-jupyter:
      include_source: true
      ignore_h1_titles: true

markdown_extensions:
  - admonition
  - def_list
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "&copy; 2026 Bidhyananda Yadav"

extra:
  analytics:
    provider: google
    property: G-7X7ET1CZZR
  social:
