      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/bidhya-n-yadav-48908322
      name: LinkedIn
    - icon: fontawesome/solid/envelope
      link: mailto:yadav.111@osu.edu
      name: Email
    - icon: fontawesome/brands/google
